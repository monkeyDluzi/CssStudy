<!DOCTYPE html>
<html>

<head>
  <title>game place</title>

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      background-image: url("fightb2.png");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }

    #ai-button {
      position: absolute;
      left: 200px;
      top: 300px;
      width: 200px;
      height: 100px;
      font-size: 24px;
      background: linear-gradient(to bottom, orange, red);
      box-shadow: 5px 5px 10px gray;
    }

    #pvp-button {
      position: absolute;
      left: 500px;
      top: 300px;
      width: 200px;
      height: 100px;
      font-size: 24px;
      background: linear-gradient(to bottom, green, blue);
      box-shadow: 5px 5px 10px gray;
    }
  </style>
</head>

<body>

  <button id="ai-button">PvAI</button>
  <button id="pvp-button">fight a human</button>

</body>
</html>
